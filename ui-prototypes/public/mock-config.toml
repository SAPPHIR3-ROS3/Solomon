path = "docs/user-guide/tailscale.md"
kind = "markdown"
status = "added"
additions = 72
deletions = 0
content = '''# Remote access with Tailscale

Solomon can detect an existing Tailscale installation and expose the web interface through Tailscale Serve.

## Security model

Tailscale controls network reachability. Solomon still approves every device and enforces its capabilities.

1. Start Solomon locally.
2. Enable Tailscale Serve from Remote access settings.
3. Open the MagicDNS URL on another device.
4. Approve the pending device from an existing trusted client.
'''

