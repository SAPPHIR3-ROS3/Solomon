path = "internal/server/static_test.go"
kind = "go"
status = "added"
additions = 25
deletions = 0
content = '''package server

import (
    "io/fs"
    "testing"
    "testing/fstest"
)

func TestLayeredAssetsPreferLastLayer(t *testing.T) {
    base := fstest.MapFS{"index.html": {Data: []byte("base")}}
    custom := fstest.MapFS{"index.html": {Data: []byte("custom")}}
    assets := layeredAssets{base: base, layers: []fs.FS{custom}}

    file, err := assets.Open("index.html")
    if err != nil {
        t.Fatal(err)
    }
    defer file.Close()
}'''

