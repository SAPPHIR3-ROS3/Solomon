[[files]]
path = "internal/server/static.go"
kind = "go"
status = "modified"
additions = 41
deletions = 8
content = '''package server

import (
    "io/fs"
    "net/http"
    "path/filepath"
    "strings"
)

// layeredAssets resolves custom UI files before embedded defaults.
type layeredAssets struct {
    base   fs.FS
    layers []fs.FS
}

func (l layeredAssets) Open(name string) (fs.File, error) {
    clean := filepath.ToSlash(filepath.Clean(name))
    for i := len(l.layers) - 1; i >= 0; i-- {
        file, err := l.layers[i].Open(clean)
        if err == nil {
            return file, nil
        }
    }
    return l.base.Open(clean)
}

func uiHandler(assets fs.FS, api http.Handler) http.Handler {
    files := http.FileServer(http.FS(assets))
    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
        if strings.HasPrefix(r.URL.Path, "/v1/") {
            api.ServeHTTP(w, r)
            return
        }
        files.ServeHTTP(w, r)
    })
}'''

[[files]]
path = "internal/server/server.go"
kind = "go"
status = "modified"
additions = 18
deletions = 4
content = '''package server

import (
    "context"
    "embed"
    "net/http"
)

//go:embed ui/dist/*
var defaultUI embed.FS

type Server struct {
    http    *http.Server
    ui      *UIManager
    project Project
}

func (s *Server) Handler() http.Handler {
    mux := http.NewServeMux()
    mux.Handle("/v1/", s.apiHandler())
    mux.Handle("/", s.ui.Handler(defaultUI))
    return mux
}

func (s *Server) Shutdown(ctx context.Context) error {
    return s.http.Shutdown(ctx)
}'''

