content = '''# Checkpoint API

Checkpoint endpoints expose the same operations used by the terminal runtime.

## List checkpoints

`GET /v1/conversations/{conversation_id}/checkpoints`

## Restore a checkpoint

`POST /v1/conversations/{conversation_id}/checkpoints/{checkpoint_id}/restore`

Restoring a checkpoint rewinds the transcript and replays staged file operations.
'''

