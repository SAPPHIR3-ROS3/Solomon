name: Post-release install smoke

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  install-smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - id: metadata
        name: Download release metadata artifact
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const runId = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifactName = 'release-metadata';

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const artifact = artifacts.find(a => a.name === artifactName && !a.expired);
            if (!artifact) {
              core.setFailed(`Artifact ${artifactName} not found for workflow run ${runId}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });

            const outDir = process.env.GITHUB_WORKSPACE;
            const zipPath = path.join(outDir, 'release-metadata.zip');
            fs.writeFileSync(zipPath, Buffer.from(download.data));
            core.setOutput('zip_path', zipPath);

      - name: Extract release metadata artifact
        shell: pwsh
        run: |
          Expand-Archive -Path "${{ steps.metadata.outputs.zip_path }}" -DestinationPath release-metadata -Force

      - id: release_tag
        name: Read release tag
        shell: pwsh
        run: |
          $tag = (Get-Content "release-metadata/release-tag.txt" -Raw).Trim()
          if (-not $tag) {
            throw 'Release tag metadata is empty'
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run README install command (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/SAPPHIR3-ROS3/Solomon/${RELEASE_TAG}/scripts/install.sh" | bash -s -- "${RELEASE_TAG}"

      - name: Run README install command (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          $script = irm "https://raw.githubusercontent.com/SAPPHIR3-ROS3/Solomon/$env:RELEASE_TAG/scripts/install.ps1"
          $block = [scriptblock]::Create($script)
          & $block -Version $env:RELEASE_TAG

      - name: Smoke test installed binary (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          exe="$HOME/go/bin/solomon"
          if [[ ! -x "$exe" ]]; then
            echo "Installed binary not found at $exe" >&2
            exit 1
          fi
          "$exe" version

      - name: Smoke test installed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Join-Path $env:USERPROFILE 'go\bin\solomon.exe'
          if (-not (Test-Path $exe)) {
            throw "Installed binary not found at $exe"
          }
          & $exe version

      - id: asset_meta_unix
        name: Resolve release asset name (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux) goos="linux" ;;
            Darwin) goos="darwin" ;;
            *)
              echo "Unsupported runner OS: $(uname -s)" >&2
              exit 1
              ;;
          esac
          case "$(uname -m)" in
            x86_64) goarch="amd64" ;;
            arm64|aarch64) goarch="arm64" ;;
            *)
              echo "Unsupported runner arch: $(uname -m)" >&2
              exit 1
              ;;
          esac
          asset="solomon-${RELEASE_TAG}-${goos}-${goarch}"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Download and smoke test release asset (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          ASSET_NAME: ${{ steps.asset_meta_unix.outputs.asset }}
        run: |
          set -euo pipefail
          if [[ -z "${ASSET_NAME}" ]]; then
            echo "Release asset name was not resolved" >&2
            exit 1
          fi
          exe="$RUNNER_TEMP/$ASSET_NAME"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${ASSET_NAME}" -o "$exe"
          chmod +x "$exe"
          if [[ ! -x "$exe" ]]; then
            echo "Downloaded asset is not executable: $exe" >&2
            exit 1
          fi
          "$exe" version

      - id: asset_meta_windows
        name: Resolve release asset name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          switch ($env:PROCESSOR_ARCHITECTURE.ToUpperInvariant()) {
            'AMD64' { $arch = 'amd64' }
            'ARM64' { $arch = 'arm64' }
            default { throw "Unsupported runner arch: $env:PROCESSOR_ARCHITECTURE" }
          }
          $asset = "solomon-$env:RELEASE_TAG-windows-$arch.exe"
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download and smoke test release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          ASSET_NAME: ${{ steps.asset_meta_windows.outputs.asset }}
        run: |
          if (-not $env:ASSET_NAME) {
            throw 'Release asset name was not resolved'
          }
          $exe = Join-Path $env:RUNNER_TEMP $env:ASSET_NAME
          $url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$env:ASSET_NAME"
          Invoke-WebRequest -Uri $url -OutFile $exe
          if (-not (Test-Path $exe)) {
            throw "Downloaded asset not found at $exe"
          }
          & $exe version
