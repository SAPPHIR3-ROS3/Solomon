name: Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
      - name: Build cursor integration bundle
        run: |
          go run scripts/cursor_bundler.go build
          go run scripts/cursor_bundler.go bundle
      - run: go vet ./...
      - run: go test ./... -count=1
      - name: Build solomon with embedded version metadata
        shell: bash
        run: go build -ldflags="-X github.com/SAPPHIR3-ROS3/Solomon/v2026/internal/agent/commands.version=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo dev) -X github.com/SAPPHIR3-ROS3/Solomon/v2026/internal/agent/commands.commit=$(git rev-parse --short HEAD)" ./cmd/solomon

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      ver: ${{ steps.version.outputs.ver }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true

      - name: Build cursor integration bundle
        run: |
          go run scripts/cursor_bundler.go build
          go run scripts/cursor_bundler.go bundle

      - id: version
        name: Resolve calendar version tag
        run: |
          set -e
          git fetch --tags origin
          if git symbolic-ref -q refs/remotes/origin/HEAD >/dev/null; then
            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
          else
            DEFAULT_BRANCH="main"
          fi
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH" --ff-only

          Y=$(date -u +%Y)
          M=$((10#$(date -u +%m)))
          D=$((10#$(date -u +%d)))
          MD=$((M * 100 + D))
          PREFIX="v${Y}.${MD}"

          MAX_REV=-1
          for t in $(git tag -l "${PREFIX}.*"); do
            SUF=${t#"$PREFIX."}
            if [[ "$SUF" =~ ^[0-9]+$ ]] && ((10#$SUF > MAX_REV)); then
              MAX_REV=$((10#$SUF))
            fi
          done
          REV=$((MAX_REV + 1))
          VER="${PREFIX}.${REV}"

          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VER" -m "Calendar release $VER"
          git push origin "$VER"
          echo "Pushed tag $VER"

      - name: Build release executables
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          set -e
          mkdir -p dist
          for spec in linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64; do
            goos="${spec%/*}"
            goarch="${spec#*/}"
            out="dist/solomon-${VER}-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              out="${out}.exe"
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w -X github.com/SAPPHIR3-ROS3/Solomon/v2026/internal/agent/commands.version=$VER -X github.com/SAPPHIR3-ROS3/Solomon/v2026/internal/agent/commands.commit=$(git rev-parse --short HEAD)" -o "$out" ./cmd/solomon
          done

      - name: Create GitHub release
        env:
          VER: ${{ steps.version.outputs.ver }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release create "$VER" dist/* \
            --title "$VER" \
            --notes "Calendar release $VER. Assets are native executables per platform (linux, windows, macOS; amd64 and arm64)."

  post_release_smoke:
    if: github.event_name == 'workflow_dispatch'
    needs: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Run README install command (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/SAPPHIR3-ROS3/Solomon/main/scripts/install.sh" | bash -s -- "${RELEASE_TAG}"

      - name: Run README install command (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
        run: |
          $script = irm "https://raw.githubusercontent.com/SAPPHIR3-ROS3/Solomon/main/scripts/install.ps1"
          $block = [scriptblock]::Create($script)
          & $block -Version $env:RELEASE_TAG

      - name: Smoke test installed binary (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          exe="$HOME/go/bin/solomon"
          if [[ ! -x "$exe" ]]; then
            echo "Installed binary not found at $exe" >&2
            exit 1
          fi
          "$exe" version

      - name: Smoke test installed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Join-Path $env:USERPROFILE 'go\bin\solomon.exe'
          if (-not (Test-Path $exe)) {
            throw "Installed binary not found at $exe"
          }
          & $exe version

      - id: asset_meta_unix
        name: Resolve release asset name (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux) goos="linux" ;;
            Darwin) goos="darwin" ;;
            *)
              echo "Unsupported runner OS: $(uname -s)" >&2
              exit 1
              ;;
          esac
          case "$(uname -m)" in
            x86_64) goarch="amd64" ;;
            arm64|aarch64) goarch="arm64" ;;
            *)
              echo "Unsupported runner arch: $(uname -m)" >&2
              exit 1
              ;;
          esac
          asset="solomon-${RELEASE_TAG}-${goos}-${goarch}"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Download and smoke test release asset (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
          ASSET_NAME: ${{ steps.asset_meta_unix.outputs.asset }}
        run: |
          set -euo pipefail
          if [[ -z "${ASSET_NAME}" ]]; then
            echo "Release asset name was not resolved" >&2
            exit 1
          fi
          exe="$RUNNER_TEMP/$ASSET_NAME"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${ASSET_NAME}" -o "$exe"
          chmod +x "$exe"
          if [[ ! -x "$exe" ]]; then
            echo "Downloaded asset is not executable: $exe" >&2
            exit 1
          fi
          "$exe" version

      - id: asset_meta_windows
        name: Resolve release asset name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
        run: |
          switch ($env:PROCESSOR_ARCHITECTURE.ToUpperInvariant()) {
            'AMD64' { $arch = 'amd64' }
            'ARM64' { $arch = 'arm64' }
            default { throw "Unsupported runner arch: $env:PROCESSOR_ARCHITECTURE" }
          }
          $asset = "solomon-$env:RELEASE_TAG-windows-$arch.exe"
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download and smoke test release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release.outputs.ver }}
          ASSET_NAME: ${{ steps.asset_meta_windows.outputs.asset }}
        run: |
          if (-not $env:ASSET_NAME) {
            throw 'Release asset name was not resolved'
          }
          $exe = Join-Path $env:RUNNER_TEMP $env:ASSET_NAME
          $url = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/$env:ASSET_NAME"
          Invoke-WebRequest -Uri $url -OutFile $exe
          if (-not (Test-Path $exe)) {
            throw "Downloaded asset not found at $exe"
          }
          & $exe version


