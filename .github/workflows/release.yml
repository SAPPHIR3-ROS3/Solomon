name: Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
      - name: Build cursor integration bundle
        run: |
          go run scripts/cursor_bundler.go build
          go run scripts/cursor_bundler.go bundle
      - run: go vet ./...
      - run: go test ./... -count=1
      - run: go build -ldflags="-X github.com/SAPPHIR3-ROS3/Solomon/internal/agent/commands.version=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo dev) -X github.com/SAPPHIR3-ROS3/Solomon/internal/agent/commands.commit=$(git rev-parse --short HEAD)" ./cmd/solomon

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true

      - name: Build cursor integration bundle
        run: |
          go run scripts/cursor_bundler.go build
          go run scripts/cursor_bundler.go bundle

      - id: version
        name: Resolve calendar version tag
        run: |
          set -e
          git fetch --tags origin
          if git symbolic-ref -q refs/remotes/origin/HEAD >/dev/null; then
            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
          else
            DEFAULT_BRANCH="main"
          fi
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH" --ff-only

          Y=$(date -u +%Y)
          M=$((10#$(date -u +%m)))
          D=$((10#$(date -u +%d)))
          MD=$((M * 100 + D))
          PREFIX="v${Y}.${MD}"

          MAX_REV=-1
          for t in $(git tag -l "${PREFIX}.*"); do
            SUF=${t#"$PREFIX."}
            if [[ "$SUF" =~ ^[0-9]+$ ]] && ((10#$SUF > MAX_REV)); then
              MAX_REV=$((10#$SUF))
            fi
          done
          REV=$((MAX_REV + 1))
          VER="${PREFIX}.${REV}"

          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VER" -m "Calendar release $VER"
          git push origin "$VER"
          echo "Pushed tag $VER"

      - name: Build release executables
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          set -e
          mkdir -p dist
          for spec in linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64; do
            goos="${spec%/*}"
            goarch="${spec#*/}"
            out="dist/solomon-${VER}-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              out="${out}.exe"
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w -X github.com/SAPPHIR3-ROS3/Solomon/internal/agent/commands.version=$VER -X github.com/SAPPHIR3-ROS3/Solomon/internal/agent/commands.commit=$(git rev-parse --short HEAD)" -o "$out" ./cmd/solomon
          done

      - name: Create GitHub release
        env:
          VER: ${{ steps.version.outputs.ver }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release create "$VER" dist/* \
            --title "$VER" \
            --notes "Calendar release $VER. Assets are native executables per platform (linux, windows, macOS; amd64 and arm64)."

      - name: Persist release metadata
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          printf '%s\n' "$VER" > release-tag.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-tag.txt
          if-no-files-found: error

